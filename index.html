<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>NEON TETRIS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #07070d;
    --bg-1: #0d0d18;
    --bg-2: #14142a;
    --line: rgba(120, 130, 200, 0.08);
    --neon-cyan: #00f0ff;
    --neon-magenta: #ff2bd6;
    --neon-yellow: #ffe600;
    --neon-green: #66ff99;
    --text: #e8e8ff;
    --text-dim: #7a7aa0;
    --panel: rgba(20, 20, 42, 0.5);
    --panel-border: rgba(0, 240, 255, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    background: var(--bg-0);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(255, 43, 214, 0.12), transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(0, 240, 255, 0.10), transparent 50%),
      linear-gradient(var(--line) 1px, transparent 1px) 0 0 / 40px 40px,
      linear-gradient(90deg, var(--line) 1px, transparent 1px) 0 0 / 40px 40px,
      var(--bg-0);
    z-index: -2;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0, 0, 0, 0) 0px,
      rgba(0, 0, 0, 0) 2px,
      rgba(0, 0, 0, 0.15) 3px,
      rgba(0, 0, 0, 0) 4px
    );
    pointer-events: none;
    z-index: 100;
    mix-blend-mode: multiply;
  }

  .stage {
    display: grid;
    grid-template-columns: 220px auto 220px;
    gap: 24px;
    align-items: center;
    padding: 16px;
    max-height: 100vh;
  }

  .left-col, .right-col {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 4px;
    padding: 14px 16px;
    backdrop-filter: blur(8px);
    position: relative;
  }

  .panel::before {
    content: '';
    position: absolute;
    top: -1px; left: 12px;
    width: 6px; height: 6px;
    background: var(--neon-cyan);
    box-shadow: 0 0 8px var(--neon-cyan);
  }

  .panel-label {
    font-family: 'Major Mono Display', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .panel-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
    letter-spacing: 1px;
    font-variant-numeric: tabular-nums;
  }

  .panel-value.cyan { color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan); }
  .panel-value.magenta { color: var(--neon-magenta); text-shadow: 0 0 10px var(--neon-magenta); }
  .panel-value.yellow { color: var(--neon-yellow); text-shadow: 0 0 10px var(--neon-yellow); }
  .panel-value.green { color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }

  .center-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .title-bar {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    width: 100%;
    padding: 0 4px;
  }

  .title {
    font-family: 'Major Mono Display', monospace;
    font-size: 22px;
    letter-spacing: 8px;
    color: var(--text);
  }

  .title .accent {
    color: var(--neon-magenta);
    text-shadow: 0 0 12px var(--neon-magenta);
  }

  .title-tag {
    font-size: 9px;
    letter-spacing: 4px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .title-tag .dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--neon-green);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--neon-green);
    margin-right: 6px;
    vertical-align: middle;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .board-frame {
    position: relative;
    padding: 4px;
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
    border-radius: 4px;
    box-shadow:
      0 0 40px rgba(0, 240, 255, 0.25),
      0 0 80px rgba(255, 43, 214, 0.15);
  }

  .board-frame::before {
    content: '';
    position: absolute;
    inset: -8px;
    border: 1px solid rgba(0, 240, 255, 0.2);
    border-radius: 6px;
    pointer-events: none;
  }

  canvas#board {
    display: block;
    background: #050510;
    border-radius: 2px;
  }

  .corner {
    position: absolute;
    width: 14px;
    height: 14px;
    border: 2px solid var(--neon-cyan);
  }
  .corner.tl { top: -10px; left: -10px; border-right: none; border-bottom: none; }
  .corner.tr { top: -10px; right: -10px; border-left: none; border-bottom: none; }
  .corner.bl { bottom: -10px; left: -10px; border-right: none; border-top: none; }
  .corner.br { bottom: -10px; right: -10px; border-left: none; border-top: none; }

  #nextCanvas {
    display: block;
    background: rgba(5, 5, 16, 0.5);
    border-radius: 2px;
    margin-top: 6px;
    width: 100%;
    height: 110px;
  }

  .controls-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    font-size: 11px;
  }

  .control-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .key {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 10px;
    background: rgba(0, 240, 255, 0.08);
    border: 1px solid rgba(0, 240, 255, 0.3);
    color: var(--neon-cyan);
    padding: 3px 8px;
    border-radius: 2px;
    min-width: 36px;
    text-align: center;
  }

  .status-bar {
    display: flex;
    justify-content: space-between;
    width: 100%;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
    padding: 0 4px;
  }

  .status-bar .right { color: var(--neon-cyan); }

  .game-over {
    position: fixed;
    inset: 0;
    background: rgba(7, 7, 13, 0.85);
    backdrop-filter: blur(6px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 200;
  }
  .game-over.show { display: flex; animation: fadeIn 0.3s ease; }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .game-over-card {
    background: var(--bg-1);
    border: 1px solid var(--neon-magenta);
    box-shadow: 0 0 60px rgba(255, 43, 214, 0.4);
    padding: 40px 60px;
    text-align: center;
    border-radius: 4px;
    position: relative;
  }

  .game-over-card .corner { border-color: var(--neon-magenta); }

  .game-over-card h2 {
    font-family: 'Major Mono Display', monospace;
    font-size: 32px;
    letter-spacing: 8px;
    color: var(--neon-magenta);
    text-shadow: 0 0 20px var(--neon-magenta);
    margin-bottom: 16px;
  }

  .game-over-card p {
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .game-over-card .final-score {
    font-size: 48px;
    font-weight: 800;
    color: var(--neon-yellow);
    text-shadow: 0 0 20px var(--neon-yellow);
    margin-bottom: 24px;
    font-variant-numeric: tabular-nums;
  }

  button {
    background: transparent;
    border: 1px solid var(--neon-cyan);
    color: var(--neon-cyan);
    padding: 12px 32px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  button:hover {
    background: var(--neon-cyan);
    color: var(--bg-0);
    box-shadow: 0 0 20px var(--neon-cyan);
  }

  .pause-indicator {
    position: absolute;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(5, 5, 16, 0.7);
    backdrop-filter: blur(2px);
    font-family: 'Major Mono Display', monospace;
    font-size: 24px;
    letter-spacing: 8px;
    color: var(--neon-yellow);
    text-shadow: 0 0 20px var(--neon-yellow);
    z-index: 10;
    pointer-events: none;
  }
  .pause-indicator.show { display: flex; }
</style>
</head>
<body>

<div class="stage">

  <div class="left-col">
    <div class="panel">
      <div class="panel-label">// score</div>
      <div class="panel-value yellow" id="score">000000</div>
    </div>
    <div class="panel">
      <div class="panel-label">// hi-score</div>
      <div class="panel-value cyan" id="highScore">000000</div>
    </div>
    <div class="panel">
      <div class="panel-label">// lines</div>
      <div class="panel-value magenta" id="lines">000</div>
    </div>
    <div class="panel">
      <div class="panel-label">// level</div>
      <div class="panel-value green" id="level">01</div>
    </div>
  </div>

  <div class="center-col">
    <div class="title-bar">
      <div class="title">N E O N<span class="accent"> // </span>T E T R I S</div>
      <div class="title-tag"><span class="dot"></span>SYS.ONLINE</div>
    </div>

    <div class="board-frame">
      <span class="corner tl"></span>
      <span class="corner tr"></span>
      <span class="corner bl"></span>
      <span class="corner br"></span>
      <canvas id="board" width="280" height="560"></canvas>
      <div class="pause-indicator" id="pauseIndicator">PAUSED</div>
    </div>

    <div class="status-bar">
      <span id="statusLeft">▸ READY</span>
      <span class="right" id="statusRight">v.4.7</span>
    </div>
  </div>

  <div class="right-col">
    <div class="panel">
      <div class="panel-label">// next</div>
      <canvas id="nextCanvas" width="180" height="110"></canvas>
    </div>

    <div class="panel">
      <div class="panel-label">// controls</div>
      <div class="controls-list">
        <div class="control-row"><span>MOVE</span><span class="key">← →</span></div>
        <div class="control-row"><span>SOFT</span><span class="key">↓</span></div>
        <div class="control-row"><span>ROTATE</span><span class="key">↑</span></div>
        <div class="control-row"><span>HARD</span><span class="key">SPC</span></div>
        <div class="control-row"><span>PAUSE</span><span class="key">P</span></div>
      </div>
    </div>
  </div>
</div>

<div class="game-over" id="gameOver">
  <div class="game-over-card">
    <span class="corner tl"></span>
    <span class="corner tr"></span>
    <span class="corner bl"></span>
    <span class="corner br"></span>
    <h2>GAME OVER</h2>
    <p>final score</p>
    <div class="final-score" id="finalScore">000000</div>
    <button onclick="restartGame()">▸ RESTART</button>
  </div>
</div>

<script>
const COLS = 10;
const ROWS = 20;
const BLOCK_SIZE = 28;
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('nextCanvas');
const nextCtx = nextCanvas.getContext('2d');

const COLORS = {
  I: { core: '#00f0ff' },
  O: { core: '#ffe600' },
  T: { core: '#c77dff' },
  S: { core: '#66ff99' },
  Z: { core: '#ff2bd6' },
  J: { core: '#3a86ff' },
  L: { core: '#ff8c42' }
};

const SHAPES = {
  I: [[1,1,1,1]],
  O: [[1,1],[1,1]],
  T: [[0,1,0],[1,1,1]],
  S: [[0,1,1],[1,1,0]],
  Z: [[1,1,0],[0,1,1]],
  J: [[1,0,0],[1,1,1]],
  L: [[0,0,1],[1,1,1]]
};

let board, currentPiece, nextPiece, score, lines, level, dropInterval, lastDrop, gameOver, paused;
let highScore = parseInt(localStorage.getItem('neon_tetris_high') || '0');

function createBoard() {
  return Array.from({length: ROWS}, () => Array(COLS).fill(0));
}

function randomPiece() {
  const types = Object.keys(SHAPES);
  const type = types[Math.floor(Math.random() * types.length)];
  return {
    type,
    shape: SHAPES[type].map(row => [...row]),
    x: Math.floor(COLS / 2) - Math.ceil(SHAPES[type][0].length / 2),
    y: 0
  };
}

function rotate(shape) {
  const rows = shape.length;
  const cols = shape[0].length;
  const rotated = Array.from({length: cols}, () => Array(rows).fill(0));
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      rotated[c][rows - 1 - r] = shape[r][c];
    }
  }
  return rotated;
}

function collides(piece, dx = 0, dy = 0, shape = null) {
  const s = shape || piece.shape;
  for (let r = 0; r < s.length; r++) {
    for (let c = 0; c < s[r].length; c++) {
      if (!s[r][c]) continue;
      const nx = piece.x + c + dx;
      const ny = piece.y + r + dy;
      if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
      if (ny >= 0 && board[ny][nx]) return true;
    }
  }
  return false;
}

function merge(piece) {
  for (let r = 0; r < piece.shape.length; r++) {
    for (let c = 0; c < piece.shape[r].length; c++) {
      if (piece.shape[r][c]) {
        const ny = piece.y + r;
        if (ny >= 0) board[ny][piece.x + c] = piece.type;
      }
    }
  }
}

function clearLines() {
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (board[r].every(cell => cell !== 0)) {
      board.splice(r, 1);
      board.unshift(Array(COLS).fill(0));
      cleared++;
      r++;
    }
  }
  if (cleared > 0) {
    const points = [0, 100, 300, 500, 800];
    score += points[cleared] * level;
    lines += cleared;
    level = Math.floor(lines / 10) + 1;
    dropInterval = Math.max(100, 1000 - (level - 1) * 100);
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('neon_tetris_high', highScore.toString());
    }
    updateInfo();
    flashStatus(cleared === 4 ? '▸ TETRIS!' : `▸ ${cleared} LINE${cleared > 1 ? 'S' : ''}`);
  }
}

function flashStatus(msg) {
  const el = document.getElementById('statusLeft');
  el.textContent = msg;
  el.style.color = '#ffe600';
  el.style.textShadow = '0 0 10px #ffe600';
  setTimeout(() => {
    el.textContent = '▸ RUNNING';
    el.style.color = '';
    el.style.textShadow = '';
  }, 1200);
}

function updateInfo() {
  document.getElementById('score').textContent = score.toString().padStart(6, '0');
  document.getElementById('highScore').textContent = highScore.toString().padStart(6, '0');
  document.getElementById('lines').textContent = lines.toString().padStart(3, '0');
  document.getElementById('level').textContent = level.toString().padStart(2, '0');
}

function drawBlock(context, x, y, type, size = BLOCK_SIZE) {
  const c = COLORS[type];
  const px = x * size;
  const py = y * size;

  context.fillStyle = c.core;
  context.fillRect(px + 1, py + 1, size - 2, size - 2);

  context.fillStyle = 'rgba(255,255,255,0.4)';
  context.fillRect(px + 1, py + 1, size - 2, 2);
  context.fillRect(px + 1, py + 1, 2, size - 2);

  context.fillStyle = 'rgba(0,0,0,0.4)';
  context.fillRect(px + 1, py + size - 3, size - 2, 2);
  context.fillRect(px + size - 3, py + 1, 2, size - 2);

  context.fillStyle = 'rgba(255,255,255,0.15)';
  context.fillRect(px + size/2 - 3, py + size/2 - 3, 6, 6);
}

function drawGhostBlock(context, x, y, type, size = BLOCK_SIZE) {
  const c = COLORS[type];
  const px = x * size;
  const py = y * size;
  context.save();
  context.strokeStyle = c.core;
  context.lineWidth = 1;
  context.globalAlpha = 0.4;
  context.strokeRect(px + 2, py + 2, size - 4, size - 4);
  const corners = 4;
  context.beginPath();
  context.moveTo(px + 2, py + 2 + corners);
  context.lineTo(px + 2, py + 2);
  context.lineTo(px + 2 + corners, py + 2);
  context.moveTo(px + size - 2 - corners, py + 2);
  context.lineTo(px + size - 2, py + 2);
  context.lineTo(px + size - 2, py + 2 + corners);
  context.moveTo(px + 2, py + size - 2 - corners);
  context.lineTo(px + 2, py + size - 2);
  context.lineTo(px + 2 + corners, py + size - 2);
  context.moveTo(px + size - 2 - corners, py + size - 2);
  context.lineTo(px + size - 2, py + size - 2);
  context.lineTo(px + size - 2, py + size - 2 - corners);
  context.lineWidth = 2;
  context.globalAlpha = 0.8;
  context.stroke();
  context.restore();
}

function draw() {
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = 'rgba(120, 130, 200, 0.05)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= COLS; i++) {
    ctx.beginPath();
    ctx.moveTo(i * BLOCK_SIZE, 0);
    ctx.lineTo(i * BLOCK_SIZE, canvas.height);
    ctx.stroke();
  }
  for (let i = 0; i <= ROWS; i++) {
    ctx.beginPath();
    ctx.moveTo(0, i * BLOCK_SIZE);
    ctx.lineTo(canvas.width, i * BLOCK_SIZE);
    ctx.stroke();
  }

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c]) drawBlock(ctx, c, r, board[r][c]);
    }
  }

  if (currentPiece && !gameOver) {
    let ghostY = 0;
    while (!collides(currentPiece, 0, ghostY + 1)) ghostY++;
    for (let r = 0; r < currentPiece.shape.length; r++) {
      for (let c = 0; c < currentPiece.shape[r].length; c++) {
        if (currentPiece.shape[r][c]) {
          drawGhostBlock(ctx, currentPiece.x + c, currentPiece.y + r + ghostY, currentPiece.type);
        }
      }
    }
  }

  if (currentPiece) {
    for (let r = 0; r < currentPiece.shape.length; r++) {
      for (let c = 0; c < currentPiece.shape[r].length; c++) {
        if (currentPiece.shape[r][c]) {
          drawBlock(ctx, currentPiece.x + c, currentPiece.y + r, currentPiece.type);
        }
      }
    }
  }
}

function drawNext() {
  nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
  if (!nextPiece) return;
  const size = 22;
  const offsetX = (nextCanvas.width - nextPiece.shape[0].length * size) / 2;
  const offsetY = (nextCanvas.height - nextPiece.shape.length * size) / 2;
  for (let r = 0; r < nextPiece.shape.length; r++) {
    for (let c = 0; c < nextPiece.shape[r].length; c++) {
      if (nextPiece.shape[r][c]) {
        const x = offsetX + c * size;
        const y = offsetY + r * size;
        const col = COLORS[nextPiece.type];
        nextCtx.fillStyle = col.core;
        nextCtx.fillRect(x + 1, y + 1, size - 2, size - 2);
        nextCtx.fillStyle = 'rgba(255,255,255,0.4)';
        nextCtx.fillRect(x + 1, y + 1, size - 2, 2);
        nextCtx.fillRect(x + 1, y + 1, 2, size - 2);
        nextCtx.fillStyle = 'rgba(0,0,0,0.4)';
        nextCtx.fillRect(x + 1, y + size - 3, size - 2, 2);
        nextCtx.fillRect(x + size - 3, y + 1, 2, size - 2);
      }
    }
  }
}

function spawnPiece() {
  currentPiece = nextPiece || randomPiece();
  nextPiece = randomPiece();
  drawNext();
  if (collides(currentPiece)) {
    gameOver = true;
    document.getElementById('finalScore').textContent = score.toString().padStart(6, '0');
    document.getElementById('gameOver').classList.add('show');
    document.getElementById('statusLeft').textContent = '▸ TERMINATED';
  }
}

function hardDrop() {
  while (!collides(currentPiece, 0, 1)) {
    currentPiece.y++;
    score += 2;
  }
  lockPiece();
}

function lockPiece() {
  merge(currentPiece);
  clearLines();
  spawnPiece();
}

function move(dx) {
  if (!collides(currentPiece, dx, 0)) currentPiece.x += dx;
}

function softDrop() {
  if (!collides(currentPiece, 0, 1)) {
    currentPiece.y++;
    score += 1;
    updateInfo();
  } else {
    lockPiece();
  }
}

function rotatePiece() {
  const rotated = rotate(currentPiece.shape);
  const kicks = [0, -1, 1, -2, 2];
  for (const kick of kicks) {
    if (!collides(currentPiece, kick, 0, rotated)) {
      currentPiece.shape = rotated;
      currentPiece.x += kick;
      return;
    }
  }
}

function gameLoop(timestamp) {
  if (gameOver) return;
  if (!paused) {
    if (!lastDrop) lastDrop = timestamp;
    if (timestamp - lastDrop > dropInterval) {
      if (!collides(currentPiece, 0, 1)) {
        currentPiece.y++;
      } else {
        lockPiece();
      }
      lastDrop = timestamp;
    }
    draw();
  }
  requestAnimationFrame(gameLoop);
}

document.addEventListener('keydown', (e) => {
  if (gameOver) return;
  if (e.key === 'p' || e.key === 'P') {
    paused = !paused;
    document.getElementById('pauseIndicator').classList.toggle('show', paused);
    document.getElementById('statusLeft').textContent = paused ? '▸ PAUSED' : '▸ RUNNING';
    return;
  }
  if (paused) return;
  switch(e.key) {
    case 'ArrowLeft': move(-1); break;
    case 'ArrowRight': move(1); break;
    case 'ArrowDown': softDrop(); break;
    case 'ArrowUp': rotatePiece(); break;
    case ' ': e.preventDefault(); hardDrop(); break;
  }
  draw();
});

function restartGame() {
  document.getElementById('gameOver').classList.remove('show');
  startGame();
}

function startGame() {
  board = createBoard();
  score = 0;
  lines = 0;
  level = 1;
  dropInterval = 1000;
  lastDrop = 0;
  gameOver = false;
  paused = false;
  nextPiece = null;
  document.getElementById('statusLeft').textContent = '▸ RUNNING';
  spawnPiece();
  updateInfo();
  requestAnimationFrame(gameLoop);
}

startGame();
</script>
